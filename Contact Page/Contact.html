<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link href="Contact Style.css" rel="stylesheet">
</head>

<body>

    <main>
        <form class="form1">

            <header>
                <h2>FORM</h2>
            </header>

            <section>
                <input class="form1Input" id="fname" type="text" placeholder="UserName" required>
            </section>

            <section>
                <input class="form1Input" id="email" type="email" placeholder="E-mail" required>
            </section>

            <section>
                <input class="form1Input" id="pass" type="password" placeholder="Password" required>
            </section>

            <section>
                <input class="form1Input" id="age" type="number" min="1" max="120" placeholder="Age">
            </section>

            <section>
                <select class="form1Input" id="country">
                    <option value="" disabled selected hidden>Country</option>
                    <option value="us">United States</option>
                    <option value="uk">United Kingdom</option>
                    <option value="ca">Canada</option>
                </select>
            </section>


            <div>
                <label id="levelsLabel" for="level"> Level Of Development </label>

                <section id="level">
                    <section>
                        <input id="basic" type="radio" placeholder="Basic">
                        <label for="basic">Basic</label>
                    </section>

                    <section>
                        <input id="Medium" type="radio" placeholder="Medium">
                        <label for="basic">Medium</label>
                    </section>


                    <section>
                        <input id="Advanced" type="radio" placeholder="Advanced">
                        <label for="basic">Advanced</label>
                    </section>
                </section>
            </div>

            <div>
                <label id="skillsLabel" for="level"> Programming Skills </label>

                <section id="Skills">
                    <section>
                        <input id="Java" type="checkbox" placeholder="Java">
                        <label for="basic">Java</label>
                    </section>

                    <section>
                        <input id="Python" type="checkbox" placeholder="Python">
                        <label for="Python">Python</label>
                    </section>


                    <section>
                        <input id="JS" type="checkbox" placeholder="JavaScript">
                        <label for="JS">JavaScript</label>
                    </section>
                </section>
            </div>




            <section class="container5">
                <button class="form1Input" type="submit">Submit</button>
            </section>

        </form>
    </main>
