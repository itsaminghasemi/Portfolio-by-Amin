<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180x180.png">
  <link rel="shortcut icon" href="/favicon-32x32.png">

  <link rel="stylesheet" href="Contact-Style.css">
</head>

<body>

<main>
  <form class="form1" action="#" method="post">

    <header>
      <h2>Contact Form</h2>
    </header>

    <section class="form-row">
      <input class="form1Input" type="text" name="username" placeholder="Username" required>
    </section>

    <section class="form-row">
      <input class="form1Input" type="email" name="email" placeholder="E-mail" required>
    </section>

    <section class="form-row">
      <input class="form1Input" type="password" name="password" placeholder="Password" required>
    </section>

    <section class="form-row">
      <input class="form1Input" type="number" name="age" min="1" max="120" placeholder="Age">
    </section>

    <section class="form-row">
      <select class="form1Input" name="country" required>
        <option value="" disabled selected hidden>Country</option>
        <option class="option-types" value="us">United States</option>
        <option class="option-types" value="uk">United Kingdom</option>
        <option class="option-types" value="ca">Canada</option>
      </select>
    </section>

    <!-- Level -->
    <div class="group">
      <p class="group-label">Level of Development</p>
      <div class="options">
        <label><input type="radio" name="level" value="basic"> Basic</label>
        <label><input type="radio" name="level" value="medium"> Medium</label>
        <label><input type="radio" name="level" value="advanced"> Advanced</label>
      </div>
    </div>

    <!-- Skills -->
    <div class="group">
      <p class="group-label">Programming Skills</p>
      <div class="options">
        <label><input type="checkbox" name="skills" value="java"> Java</label>
        <label><input type="checkbox" name="skills" value="python"> Python</label>
        <label><input type="checkbox" name="skills" value="javascript"> JavaScript</label>
      </div>
    </div>

    <section class="form-row submit-row">
      <button class="form1Input" id="submit-text" type="submit">Submit</button>
    </section>

  </form>
</main>

<footer class="site-footer">
  <nav class="links">
    <a href="../Home Page/Vitrine.html" target="_blank">Vitrine</a>
  </nav>
</footer>

</body>
</html>
