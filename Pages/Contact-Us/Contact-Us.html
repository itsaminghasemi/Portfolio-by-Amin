<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Premium</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../../Others/Images/Favicons/new favicon-32x32.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="../../Others/Images/Favicons/new favicon-16x16.png?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="../../Others/Images/Favicons/new apple-touch-icon.png?v=2">
    <link rel="icon" type="image/png" sizes="192x192" href="../../Others/Images/Favicons/new android-chrome-192x192.png?v=2">
    <link rel="icon" type="image/png" sizes="512x512" href="../../Others/Images/Favicons/new android-chrome-512x512.png?v=2">
    <link rel="shortcut icon" href="../../Others/Images/Favicons/new favicon-32x32.png?v=2">

    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="Contact-Us-Style.css">
</head>
<body>

<header class="glass-navbar fade-in-up">
    <div class="navbar-container">
      <a href=href="../Vitrine-Page/Vitrine.html" class="nav-logo">
        <span class="logo-icon">✨</span>
        <span>MuhammadAmin Ghasemi</span>
      </a>
      <input type="checkbox" id="nav-toggle" class="nav-toggle">
      <label for="nav-toggle" class="nav-toggle-label">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <nav class="nav-links">
        <a href="../Vitrine-Page/Vitrine.html" class="nav-link">Vitrine</a>
        <a href="../Me-On-Social/Me-On-Social.html" class="nav-link">Me On Social</a>
        <a href="../Contact-Us/Contact-Us.html" class="nav-link active">Contact Us</a>
      </nav>
    </div>
</header>

<main class="form-container fade-in-up delay-1">
    <header class="form-header">
        <h2>Let's create magic</h2>
        <p>Reach out and let's turn your vision into reality.</p>
    </header>

    <form class="form-premium" action="#" method="post">
        <div class="form-grid">
            
            <div class="input-group">
                <div class="input-wrapper">
                    <input type="text" id="firstName" name="firstName" placeholder=" " required>
                    <label for="firstName">First Name</label>
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <input type="text" id="lastName" name="lastName" placeholder=" " required>
                    <label for="lastName">Last Name</label>
                </div>
            </div>

            <div class="input-group full-width">
                <div class="input-wrapper email-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <input type="email" id="email" name="email" placeholder=" " required>
                    <label for="email">Email Address</label>
                </div>
            </div>

            <div class="input-group full-width">
                <p class="group-title">What are you interested in?</p>
                <div class="radio-card-group">
                    <input type="radio" id="webDev" name="projectType" value="web" checked>
                    <label class="radio-card" for="webDev">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                        <span>Web Dev</span>
                    </label>

                    <input type="radio" id="appDev" name="projectType" value="app">
                    <label class="radio-card" for="appDev">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                        <span>App Dev</span>
                    </label>

                    <input type="radio" id="design" name="projectType" value="design">
                    <label class="radio-card" for="design">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
                        <span>Design</span>
                    </label>
                </div>
            </div>

            <div class="input-group full-width">
                <div class="input-wrapper">
                    <textarea id="message" name="message" rows="4" placeholder=" " required></textarea>
                    <label for="message">Project Details</label>
                </div>
            </div>

            <div class="input-group full-width">
                <input type="file" id="fileUpload" name="fileUpload" class="hidden-input">
                <label class="file-upload-label" for="fileUpload">
                    <span class="upload-icon-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    </span>
                    <span class="upload-text">Click to attach a file <span>(PDF, DOCX, PNG)</span></span>
                </label>
            </div>

            <div class="input-group full-width toggle-group">
                <label class="toggle-switch">
                    <input type="checkbox" name="newsletter">
                    <span class="slider"></span>
                </label>
                <span class="toggle-label">Subscribe to weekly newsletter</span>
            </div>

            <div class="input-group full-width">
                <button type="submit" class="btn-submit">
                    <span>Send Message</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>

        </div>
    </form>
</main>

</body>
</html>
