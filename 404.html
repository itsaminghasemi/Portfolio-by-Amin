<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 | Amin Ghasemi</title>
  <meta name="description" content="Page not found.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="Others/Images/Favicons/favicon-32x32.png">
  <link rel="stylesheet" href="global.css">
  <style>
    body {
      background: radial-gradient(circle at 50% -20%, #2b1055 0%, #0b0b1a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text-on-dark);
      padding: 2rem;
    }
    .error-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .error-msg {
      font-size: 1.3rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 99px;
      color: var(--text-on-dark);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .home-link:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <main id="main-content">
    <div class="error-code">404</div>
    <p class="error-msg">The page you're looking for doesn't exist.</p>
    <a href="index.html" class="home-link">&larr; Back to Home</a>
  </main>
</body>
</html>
